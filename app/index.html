<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>帽制片 · 选题雷达</title>
  <meta name="theme-color" content="#b0492e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="选题雷达" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 顶栏 -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">帽</span>
      <div class="brand-text">
        <strong>帽制片</strong>
        <span>制片效率工作台</span>
      </div>
    </div>
    <nav class="modules">
      <button class="module active" data-module="策划">策划 · 选题雷达</button>
      <button class="module disabled" title="即将上线">制作 · 剧本拆解 <em>即将上线</em></button>
      <button class="module disabled" title="即将上线">发行 <em>即将上线</em></button>
    </nav>
  </header>

  <main class="layout">
    <!-- 左侧：口味画像 + 筛选 -->
    <aside class="sidebar">
      <section class="card taste-card">
        <h3>选题偏好 <button class="reset-pref" id="resetPref" title="恢复默认">重置</button></h3>
        <div class="principle" id="principle"></div>
        <div class="pref-block">
          <span class="taste-label">喜欢的题材 <em>点一下=喜欢 · 再点=不感冒 · 再点=取消</em></span>
          <div class="chips chips-pref" id="genrePalette"></div>
        </div>
        <div class="pref-block">
          <span class="taste-label">体量</span>
          <div class="chips chips-toggle" id="scalePick"></div>
        </div>
        <div class="pref-block">
          <span class="taste-label">完结状态</span>
          <select id="statusPick">
            <option value="优先已完结">优先已完结</option>
            <option value="连载中优先">连载中优先</option>
            <option value="不限">不限</option>
          </select>
        </div>
        <div class="profile-summary" id="profileSummary"></div>
        <p class="learn-note" id="learnNote">反馈学习：尚无反馈</p>
        <p class="multi-note">每位制片人可自定义此偏好；正式版多用户。测试版选品仍按默认口味产出。</p>
      </section>

      <section class="card filter-card">
        <h3>筛选</h3>
        <input type="search" id="searchBox" placeholder="搜索书名 / 作者…" />
        <div class="filter-row">
          <label>题材</label>
          <div class="chips chips-filter" id="genreFilter"></div>
        </div>
        <div class="filter-row">
          <label>来源</label>
          <div class="chips chips-filter" id="sourceFilter"></div>
        </div>
        <div class="filter-row">
          <label>状态</label>
          <select id="statusFilter">
            <option value="">全部</option>
            <option value="已完结">已完结</option>
            <option value="连载中">连载中</option>
          </select>
        </div>
        <label class="checkbox-row">
          <input type="checkbox" id="favOnly" /> 只看我收藏的
        </label>
      </section>
    </aside>

    <!-- 右侧：内容 -->
    <section class="content">
      <div class="content-head">
        <div>
          <h1>选题雷达</h1>
          <p class="subtitle">
            在大买家之前，发现还没卖、又有改编潜力的早期作品 ·
            <span id="weekLabel"></span>
          </p>
        </div>
        <div class="source-pill" id="sourcePill"></div>
      </div>

      <!-- 本周说明 -->
      <div class="agent-note" id="agentNote">
        <div class="agent-note-head">
          <span class="agent-badge">智能体 · 本周说明</span>
        </div>
        <p id="agentNoteText"></p>
      </div>

      <!-- 本周精选 -->
      <div class="section-head">
        <h2>本周精选 <span class="count" id="weeklyCount"></span></h2>
      </div>
      <div class="cards" id="weeklyCards"></div>

      <!-- 备选库 -->
      <div class="section-head">
        <h2>备选库 / 往期</h2>
        <span class="hint">真实作品；标 ✓ 者链接已核实</span>
      </div>
      <div class="cards" id="candidateCards"></div>

      <p class="empty" id="emptyState" hidden>没有符合筛选条件的作品。</p>
    </section>
  </main>

  <!-- 详情弹窗 -->
  <div class="modal-overlay" id="modal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="关闭">×</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <footer class="footer">
    <span>帽制片 · 选题雷达 测试版 v0.1</span>
    <span>数据来源：豆瓣阅读公开页面（书名/链接/字数/梗概为真实信息，改编分析为智能体判断）</span>
  </footer>

  <script src="data/recommendations.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
    }
  </script>
</body>
</html>
